name: CI

on:
  push:
    branches: ["main", "release/*"]
    paths:
      - "**.rs"
      - "**.py"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/pyproject.toml"
      - "**/poetry.lock"
  pull_request:
    branches: ["main", "release/*"]
    paths:
      - "**.rs"
      - "**.py"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/pyproject.toml"
      - "**/poetry.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-analysis:
    name: "Static analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.8.2
        with:
          workspaces: "mosaicod -> target"
      
      - name: Backend Lint
        working-directory: mosaicod
        run: |
          cargo fmt -- --check
          cargo clippy -- -D warnings

      - name: Python SDK Lint
        run: |
          pipx install ruff
          ruff format --check mosaico-sdk-py
          ruff check mosaico-sdk-py

  backend-unit-tests:
    name: "Backend: unit tests"
    needs: [static-analysis]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install System Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Unit Tests
        run: ./scripts/tests.sh --mosaicod

  python-sdk-unit-tests:
    name: "Python SDK: unit tests on (Py ${{ matrix.python-version }})"
    needs: [static-analysis]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    runs-on: ubuntu-24.04
    env:
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
    steps:
      - uses: actions/checkout@v6
      - name: Install Poetry
        run: pipx install poetry
      - name: Setup Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
      - name: Unit Tests
        run: ./scripts/tests.sh --sdk-python

  full-stack-tests:
    name: "Full stack tests on (Py ${{ matrix.python-version }})"
    needs: [backend-unit-tests, python-sdk-unit-tests]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    runs-on: ubuntu-24.04
    env:
      PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      
      - name: Install Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Poetry
        run: pipx install poetry
      - uses: actions/setup-python@v6.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"

      - name: Integration Tests
        run: |
          ./scripts/tests.sh --full-stack
          ./scripts/tests.sh --full-stack-tls
